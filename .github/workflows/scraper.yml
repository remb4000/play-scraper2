name: Google Play Scraper

on:
  workflow_dispatch: # Эта строчка позволяет запускать парсер кнопкой вручную

jobs:
  scrape:
    runs-on: ubuntu-latest # Сервер на Linux
    
    steps:
      - name: Копируем файлы из репозитория
        uses: actions/checkout@v4
        
      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Устанавливаем библиотеки
        run: |
          python -m pip install --upgrade pip
          pip install google-play-scraper pandas openpyxl
          
      - name: Запускаем снайпер-парсер
        run: python scraper.py
        
      - name: Сохраняем Excel как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: CIS_Leads_Database # Название папки для скачивания
          path: CIS_Games_2025_DeepSearch.xlsx # Имя файла, которое генерирует наш Python скрипт
