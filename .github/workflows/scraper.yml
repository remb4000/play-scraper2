name: Google Play Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Копируем файлы
        uses: actions/checkout@v4
        
      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Устанавливаем библиотеки
        run: |
          python -m pip install --upgrade pip
          pip install google-play-scraper pandas openpyxl requests
          
      - name: Запускаем снайпер-парсер
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py
        
      - name: Сохраняем Excel на GitHub (Резервная копия)
        uses: actions/upload-artifact@v4
        with:
          name: CIS_Leads_Database
          path: Leads.xlsx
